# Single-VM deployment (Docker Compose) for the Proxmox Ubuntu host.
#
# WHY compose, not Kubernetes: the VM has no passwordless sudo, so RKE2/k8s (root install) can't be
# automated here. Docker works rootless for `cosmic`. This brings up the FULL posctl stack on one
# host — a real, running dev deployment. It is NOT the production design (no HA Postgres/Ceph/quorum;
# see ADR-009 + RUNBOOK). Ports avoid the VM's existing grafana(3000)/prometheus(9090).
name: posctl

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: posctl
      POSTGRES_PASSWORD: posctl
      POSTGRES_DB: posctl
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posctl"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redisdata:/data]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: posctl
      MINIO_ROOT_PASSWORD: posctlsecret
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm", "--http-port=8081"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      # Served behind the web nginx at https://<host>:8443/auth — trust the X-Forwarded-* headers so
      # Keycloak stamps the EXTERNAL https issuer + builds correct login/redirect URLs.
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    ports: ["8081:8081"]   # still published for direct admin access
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    restart: unless-stopped

  api:
    build: { context: ./apps/api }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_URL: jdbc:postgresql://postgres:5432/posctl
      POSTGRES_USER: posctl
      POSTGRES_PASSWORD: posctl
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Tokens are issued by the EXTERNAL https origin (browser side), but the API validates them
      # internally: it trusts that issuer string and fetches the signing keys over the in-cluster
      # http URL (no TLS/hostname headache between containers).
      OIDC_ISSUER_URI: https://192.168.1.40:8443/auth/realms/posctl
      OIDC_JWK_SET_URI: http://keycloak:8081/auth/realms/posctl/protocol/openid-connect/certs
      # Flyway owns the schema; skip Hibernate's stricter type validation for this dev deploy
      # (it flags citext-vs-varchar etc. which are runtime-compatible). CI keeps ddl-auto=validate.
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      POSCTL_WORKER_ENABLED: "false"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8080:8080"]
    restart: unless-stopped

  worker:
    build: { context: ./apps/api }   # same image as api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      POSTGRES_URL: jdbc:postgresql://postgres:5432/posctl
      POSTGRES_USER: posctl
      POSTGRES_PASSWORD: posctl
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OIDC_ISSUER_URI: http://keycloak:8081/realms/posctl
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      POSCTL_WORKER_ENABLED: "true"   # this instance runs the scheduled jobs (outbox relay, scoring)
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"   # api owns schema; don't crash-loop worker on checksum drift
    depends_on:
      api: { condition: service_started }   # let api run Flyway migrations first
    restart: unless-stopped

  web:
    build: { context: ./apps/web }
    ports: ["8443:8443"]   # single-origin HTTPS: SPA + /api + /auth proxied here
    depends_on: [api, keycloak]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
