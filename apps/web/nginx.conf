# Single-origin HTTPS: serves the SPA and reverse-proxies /api -> backend and /auth -> Keycloak,
# all under one https:// origin. This (a) gives the browser a secure context so OIDC PKCE's
# crypto.subtle works, and (b) avoids mixed-content (everything is same-origin https).
server {
  listen 8443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;

  root /usr/share/nginx/html;
  index index.html;

  # Backend API
  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 120s;
  }

  # Keycloak (served under /auth via KC_HTTP_RELATIVE_PATH)
  location /auth/ {
    proxy_pass http://keycloak:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 8443;
  }

  # Long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback (and serves /config.js)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
