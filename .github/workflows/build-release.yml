name: build-release
on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: harbor.santimpay.local
  IMAGE_NS: posctl

jobs:
  images:
    runs-on: [self-hosted, linux]
    permissions: { contents: read }
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/${{ matrix.app }}:${{ github.sha }}
          provenance: true
          sbom: true
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/${{ matrix.app }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Cosign sign
        env: { COSIGN_KEY: ${{ secrets.COSIGN_KEY }}, COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }} }
        run: cosign sign --yes --key env://COSIGN_KEY ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/${{ matrix.app }}:${{ github.sha }}

  bump-gitops:
    needs: images
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4
        with: { repository: santimpay/posctl-platform, token: ${{ secrets.PLATFORM_REPO_TOKEN }} }
      - name: Bump image tag in dev overlay (ArgoCD then syncs)
        run: |
          cd deploy/overlays/dev
          sed -i "s/newTag:.*/newTag: ${{ github.sha }}/" kustomization.yaml
          git config user.name posctl-ci
          git config user.email ci@santimpay.local
          git commit -am "ci: posctl images -> ${{ github.sha }}"
          git push
