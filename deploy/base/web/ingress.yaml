# Single ingress fronting both the SPA and the API under one host. cloudflared routes the public
# hostname to this internal ingress; /api goes to the backend, everything else to the SPA.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: posctl
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"   # TLS terminates at Cloudflare edge
spec:
  ingressClassName: nginx
  rules:
    - host: app.posctl.santimpay.com   # overridden per-env in the overlay
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: posctl-api, port: { number: 80 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: posctl-web, port: { number: 80 } } }
