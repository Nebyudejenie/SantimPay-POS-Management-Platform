# Worker receives NO ingress (serves no traffic); egress to data + platform + observability only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: posctl-worker
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: posctl-worker }
  policyTypes: [Ingress, Egress]
  ingress: []   # deny all inbound
  egress:
    - to: []
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data } } }]
      ports:
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 9000 }
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: platform } } }]
      ports: [{ protocol: TCP, port: 8200 }]
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } } }]
      ports: [{ protocol: TCP, port: 4318 }]
