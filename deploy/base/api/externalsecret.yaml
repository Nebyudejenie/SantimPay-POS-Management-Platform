# Pulls the API's runtime secrets from Vault into a native k8s Secret via External Secrets Operator.
# No static secrets in Git. The keys here are what application.yml expects via env.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: posctl-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: posctl-api-secrets
    creationPolicy: Owner
  data:
    - { secretKey: POSTGRES_URL, remoteRef: { key: posctl/api, property: postgres_url } }
    - { secretKey: POSTGRES_USER, remoteRef: { key: posctl/api, property: postgres_user } }
    - { secretKey: POSTGRES_PASSWORD, remoteRef: { key: posctl/api, property: postgres_password } }
    - { secretKey: REDIS_HOST, remoteRef: { key: posctl/api, property: redis_host } }
    - { secretKey: REDIS_PORT, remoteRef: { key: posctl/api, property: redis_port } }
    - { secretKey: S3_ENDPOINT, remoteRef: { key: posctl/api, property: s3_endpoint } }
    - { secretKey: S3_ACCESS_KEY, remoteRef: { key: posctl/api, property: s3_access_key } }
    - { secretKey: S3_SECRET_KEY, remoteRef: { key: posctl/api, property: s3_secret_key } }
    - { secretKey: OIDC_ISSUER_URI, remoteRef: { key: posctl/api, property: oidc_issuer_uri } }
