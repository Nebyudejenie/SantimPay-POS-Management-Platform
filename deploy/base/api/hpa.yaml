apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: posctl-api
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: posctl-api }
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: posctl-api
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: posctl-api }
