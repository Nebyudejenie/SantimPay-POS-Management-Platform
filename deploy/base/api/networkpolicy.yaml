# Default-deny + explicit allows. The data namespace is reachable ONLY from app workloads.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: posctl-api
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: posctl-api }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
      ports: [{ protocol: TCP, port: 8080 }]
  egress:
    # DNS
    - to: []
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    # Postgres / Redis / MinIO in data ns
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: data } } }]
      ports:
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 9000 }
    # Keycloak / Vault in platform ns
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: platform } } }]
      ports: [{ protocol: TCP, port: 8080 }, { protocol: TCP, port: 8200 }]
    # Tempo (OTLP) in observability ns
    - to: [{ namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: observability } } }]
      ports: [{ protocol: TCP, port: 4318 }]
