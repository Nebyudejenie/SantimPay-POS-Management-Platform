# Namespaces with the labels NetworkPolicies + PodSecurity admission select on.
apiVersion: v1
kind: Namespace
metadata:
  name: data
  labels: { kubernetes.io/metadata.name: data, pod-security.kubernetes.io/enforce: restricted }
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  labels: { kubernetes.io/metadata.name: platform, pod-security.kubernetes.io/enforce: baseline }
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels: { kubernetes.io/metadata.name: observability, pod-security.kubernetes.io/enforce: baseline }
---
apiVersion: v1
kind: Namespace
metadata:
  name: app
  labels: { kubernetes.io/metadata.name: app, pod-security.kubernetes.io/enforce: restricted }
