# Internal ingress-nginx (no public LB) + cloudflared (outbound-only tunnel). Together these expose
# the app publicly WITHOUT opening a single inbound firewall port (docs/07 §3, §11).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "3" }
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.x
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          service: { type: ClusterIP }   # internal only; reached via cloudflared
          metrics: { enabled: true, serviceMonitor: { enabled: true } }
  destination: { server: https://kubernetes.default.svc, namespace: ingress-nginx }
  syncPolicy: { automated: { prune: true, selfHeal: true }, syncOptions: [CreateNamespace=true] }
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "3" }
spec:
  project: default
  source:
    repoURL: https://github.com/santimpay/posctl-platform.git
    targetRevision: main
    path: deploy/platform/cloudflared
  destination: { server: https://kubernetes.default.svc, namespace: app }
  syncPolicy: { automated: { prune: true, selfHeal: true } }
