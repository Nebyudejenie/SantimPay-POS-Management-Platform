---
# Installs RKE2 agents (worker nodes) and joins them to the cluster.
- name: Create RKE2 config dir
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: "0755"

- name: Write RKE2 agent config
  ansible.builtin.copy:
    dest: /etc/rancher/rke2/config.yaml
    mode: "0600"
    content: |
      server: https://{{ rke2_api_vip }}:9345
      token: {{ rke2_token }}

- name: Install RKE2 agent
  ansible.builtin.shell: |
    curl -sfL https://get.rke2.io | INSTALL_RKE2_CHANNEL={{ rke2_channel }} \
      INSTALL_RKE2_VERSION={{ rke2_version }} INSTALL_RKE2_TYPE=agent sh -
  args:
    creates: /usr/local/bin/rke2

- name: Enable + start rke2-agent
  ansible.builtin.service:
    name: rke2-agent
    state: started
    enabled: true
