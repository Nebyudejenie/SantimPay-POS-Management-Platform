---
# Prerequisites every Kubernetes node needs before RKE2 install.
- name: Disable swap now
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap from fstab (persist across reboot)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: [overlay, br_netfilter]

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: "overlay\nbr_netfilter\n"
    mode: "0644"

- name: Networking sysctls for k8s
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "1"
    state: present
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables }
    - { name: net.bridge.bridge-nf-call-ip6tables }
    - { name: net.ipv4.ip_forward }

- name: Install qemu-guest-agent (Proxmox)
  ansible.builtin.apt:
    name: qemu-guest-agent
    state: present
    update_cache: true
